<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>読む — Yomu</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Noto+Sans+JP:wght@300;400&family=Shippori+Mincho:wght@400;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:#1a1410; --paper:#f5f0e8; --accent:#8b1a1a;
    --accent2:#c4773a; --muted:#7a7060;
    --highlight:rgba(139,26,26,0.12); --border:rgba(26,20,16,0.15);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--ink);font-family:'Noto Sans JP',sans-serif;min-height:100vh;color:var(--ink);overflow-x:hidden;}

  /* ── SETUP ── */
  #setup-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;background:var(--ink);position:relative;}
  #setup-screen::before{content:'読';position:absolute;font-family:'Shippori Mincho',serif;font-size:40vw;color:rgba(255,255,255,0.02);pointer-events:none;line-height:1;top:50%;left:50%;transform:translate(-50%,-50%);}
  .setup-card{background:var(--paper);border-radius:2px;padding:3rem;max-width:480px;width:100%;position:relative;box-shadow:0 40px 80px rgba(0,0,0,0.6);}
  .setup-card::before{content:'';position:absolute;top:8px;left:8px;right:-8px;bottom:-8px;background:var(--accent);z-index:-1;border-radius:2px;}
  .logo{font-family:'Shippori Mincho',serif;font-size:3rem;color:var(--accent);margin-bottom:0.25rem;line-height:1;}
  .logo-sub{font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--muted);font-style:italic;margin-bottom:2rem;letter-spacing:0.05em;}
  .setup-label{font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:0.5rem;}
  .setup-input{width:100%;padding:0.75rem 1rem;border:1px solid var(--border);background:white;border-radius:1px;font-family:'Noto Sans JP',sans-serif;font-size:0.85rem;color:var(--ink);margin-bottom:1.25rem;outline:none;transition:border-color 0.2s;}
  .setup-input:focus{border-color:var(--accent);}
  .setup-input::placeholder{color:#bbb;}
  .level-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:1.5rem;}
  .level-btn{padding:0.6rem 0;border:1px solid var(--border);background:white;border-radius:1px;font-family:'Shippori Mincho',serif;font-size:0.9rem;cursor:pointer;transition:all 0.15s;color:var(--ink);}
  .level-btn:hover{border-color:var(--accent);color:var(--accent);}
  .level-btn.active{background:var(--accent);border-color:var(--accent);color:white;}
  .start-btn{width:100%;padding:1rem;background:var(--accent);color:white;border:none;border-radius:1px;font-family:'DM Serif Display',serif;font-size:1.1rem;font-style:italic;cursor:pointer;letter-spacing:0.05em;transition:all 0.2s;}
  .start-btn:hover{background:#6b1010;transform:translateY(-1px);}
  .start-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
  .setup-note{font-size:0.72rem;color:var(--muted);margin-top:1rem;line-height:1.6;}
  .setup-note a{color:var(--accent);text-decoration:none;}

  /* ── READER SHELL ── */
  #reader-screen{display:none;min-height:100vh;background:var(--ink);}
  .reader-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;border-bottom:1px solid rgba(255,255,255,0.06);position:sticky;top:0;background:var(--ink);z-index:100;}
  .header-left{display:flex;align-items:center;gap:1rem;}
  .header-logo{font-family:'Shippori Mincho',serif;font-size:1.4rem;color:var(--paper);opacity:0.7;}
  .level-badge{font-size:0.7rem;letter-spacing:0.1em;color:var(--accent2);border:1px solid rgba(196,119,58,0.3);padding:0.25rem 0.7rem;border-radius:1px;transition:color 0.5s;}
  .streak-badge{font-size:0.7rem;color:var(--accent2);letter-spacing:0.06em;opacity:0.8;}
  .header-right{display:flex;align-items:center;gap:0.75rem;}
  .goal-ring{display:flex;align-items:center;gap:8px;}
  .ring-svg{width:28px;height:28px;transform:rotate(-90deg);}
  .ring-bg{fill:none;stroke:rgba(255,255,255,0.08);stroke-width:3;}
  .ring-fill{fill:none;stroke:var(--accent2);stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset 0.5s ease;}
  .ring-label{font-size:0.7rem;color:var(--muted);letter-spacing:0.06em;}
  .icon-btn{font-size:0.72rem;letter-spacing:0.08em;color:var(--paper);opacity:0.45;border:1px solid rgba(255,255,255,0.12);background:none;padding:0.3rem 0.7rem;border-radius:1px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:opacity 0.2s;white-space:nowrap;}
  .icon-btn:hover{opacity:1;}
  .progress-bar{height:2px;background:rgba(255,255,255,0.05);}
  .progress-fill{height:100%;background:var(--accent);transition:width 0.5s ease;}

  /* ── READER BODY ── */
  .reader-body{max-width:720px;margin:0 auto;padding:2.5rem 2rem 6rem;}

  /* image */

  @keyframes pulse{0%,100%{opacity:0.5}50%{opacity:1}}

  /* story meta */
  .story-genre{font-size:0.65rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent2);margin-bottom:0.5rem;}
  .story-title{font-family:'Shippori Mincho',serif;font-size:2rem;color:var(--paper);margin-bottom:0.35rem;line-height:1.3;}
  .story-title-en{font-family:'DM Serif Display',serif;font-size:1rem;color:var(--muted);font-style:italic;margin-bottom:2rem;}
  .divider{width:40px;height:1px;background:var(--accent);margin-bottom:2rem;opacity:0.6;}

  /* part indicator */
  .part-indicator{display:flex;align-items:center;gap:8px;margin-bottom:1.5rem;}
  .part-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.12);transition:all 0.3s;}
  .part-dot.active{background:var(--accent2);transform:scale(1.2);}
  .part-dot.done{background:rgba(196,119,58,0.4);}
  .part-label{font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);}

  /* story text */
  .story-text{color:var(--paper);line-height:2.6;font-size:1.1rem;margin-bottom:2rem;}
  .word-token{display:inline;position:relative;cursor:pointer;border-radius:2px;padding:0 1px;transition:background 0.15s;}
  .word-token:hover{background:var(--highlight);}
  .word-token.has-kanji{border-bottom:1px dotted rgba(196,119,58,0.45);}
  .word-token.clicked{background:rgba(139,26,26,0.18);}
  ruby{display:inline-flex;flex-direction:column-reverse;align-items:center;vertical-align:bottom;}
  rt{font-size:0.55em;color:var(--accent2);line-height:1;margin-bottom:1px;font-family:'Noto Sans JP',sans-serif;font-weight:300;}

  /* color coding */
  .token-name{color:#e8c97a;border-bottom:1px solid rgba(232,201,122,0.35);}
  .token-topic{color:rgba(245,240,232,0.55);font-size:0.95em;}
  .token-particle{color:rgba(245,240,232,0.6);}

  /* sentence wrap — plain inline, no play button */
  .sentence-wrap{display:inline;}

  /* paragraph play button */
  .para-play-btn{display:flex;align-items:center;gap:8px;background:none;border:1px solid rgba(255,255,255,0.1);border-radius:1px;padding:0.4rem 0.9rem;cursor:pointer;margin-bottom:1.25rem;transition:all 0.2s;}
  .para-play-btn:hover{border-color:rgba(196,119,58,0.5);background:rgba(196,119,58,0.06);}
  .para-play-btn svg{width:10px;height:10px;fill:var(--accent2);flex-shrink:0;}
  .para-play-btn span{font-size:0.7rem;letter-spacing:0.1em;color:var(--muted);}
  .para-play-btn.playing{border-color:var(--accent2);background:rgba(196,119,58,0.08);}
  .para-play-btn.playing span{color:var(--accent2);}

  /* tooltip word speaker */
  .tt-speak-btn{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;border:1px solid rgba(26,20,16,0.2);background:none;cursor:pointer;margin-left:6px;vertical-align:middle;transition:all 0.15s;flex-shrink:0;}
  .tt-speak-btn:hover{background:rgba(139,26,26,0.1);border-color:var(--accent);}
  .tt-speak-btn svg{width:9px;height:9px;fill:var(--accent);}

  /* part actions */
  .part-actions{display:flex;align-items:center;gap:12px;margin-top:0.5rem;padding-top:1.5rem;border-top:1px solid rgba(255,255,255,0.06);}
  .continue-btn{flex:1;padding:0.85rem 1.5rem;background:none;border:1px solid rgba(255,255,255,0.2);color:var(--paper);border-radius:1px;font-family:'DM Serif Display',serif;font-size:1rem;font-style:italic;cursor:pointer;transition:all 0.2s;letter-spacing:0.04em;}
  .continue-btn:hover{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.4);}
  .continue-btn.primary{background:var(--accent);border-color:var(--accent);}
  .continue-btn.primary:hover{background:#6b1010;}
  .continue-btn:disabled{opacity:0.3;cursor:not-allowed;}

  /* inline part loading */
  .part-loading{display:none;align-items:center;gap:10px;padding:1.5rem 0;color:var(--muted);font-size:0.8rem;letter-spacing:0.1em;}
  .part-loading.active{display:flex;}
  .part-spinner{width:16px;height:16px;border:1.5px solid rgba(255,255,255,0.1);border-top-color:var(--accent2);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}


  /* ── KANJI MATCHER ── */
  .matcher-section{margin-top:2.5rem;padding-top:2rem;border-top:1px solid rgba(255,255,255,0.08);}
  .matcher-title{font-size:0.65rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent2);margin-bottom:0.4rem;}
  .matcher-subtitle{font-size:0.78rem;color:var(--muted);margin-bottom:1.5rem;line-height:1.6;}
  .matcher-score{font-size:0.78rem;color:var(--muted);margin-bottom:1.25rem;letter-spacing:0.06em;}
  .matcher-score strong{color:var(--paper);}
  .matcher-columns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.5rem;}
  .matcher-col{display:flex;flex-direction:column;gap:8px;}
  .match-card{
    padding:0.6rem 0.75rem;border:1px solid rgba(255,255,255,0.12);border-radius:2px;
    cursor:pointer;transition:all 0.18s;font-size:0.88rem;color:var(--paper);
    background:rgba(255,255,255,0.03);user-select:none;position:relative;
    display:flex;align-items:center;gap:8px;min-height:44px;
  }
  .match-card:hover{border-color:rgba(255,255,255,0.3);background:rgba(255,255,255,0.06);}
  .match-card.selected{border-color:var(--accent2);background:rgba(196,119,58,0.12);color:var(--accent2);}
  .match-card.correct{border-color:#1D9E75;background:rgba(29,158,117,0.15);color:#1D9E75;animation:matchPop 0.35s ease forwards;}
  .match-card.wrong{border-color:var(--accent);background:rgba(139,26,26,0.2);animation:matchShake 0.35s ease;}
  .match-card.gone{opacity:0;pointer-events:none;transition:opacity 0.4s ease;}
  @keyframes matchPop{0%{transform:scale(1)}50%{transform:scale(1.04)}100%{transform:scale(1)}}
  @keyframes matchShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  .match-kanji-text{font-family:'Shippori Mincho',serif;font-size:1.1rem;flex:1;}
  .match-meaning-text{font-size:0.8rem;flex:1;line-height:1.4;}
  .furi-btn{
    width:20px;height:20px;border-radius:2px;border:1px solid rgba(255,255,255,0.15);
    background:none;color:rgba(255,255,255,0.35);font-size:0.6rem;cursor:pointer;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    transition:all 0.15s;font-family:'Noto Sans JP',sans-serif;line-height:1;padding:0;
  }
  .furi-btn:hover{border-color:var(--accent2);color:var(--accent2);}
  .furi-btn.active{border-color:var(--accent2);color:var(--accent2);background:rgba(196,119,58,0.1);}
  .match-furigana{font-size:0.6rem;color:var(--accent2);display:none;font-family:'Noto Sans JP',sans-serif;line-height:1;margin-bottom:1px;}
  .match-furigana.visible{display:block;}
  .matcher-result{
    text-align:center;padding:1.25rem;border:1px solid rgba(255,255,255,0.08);
    border-radius:2px;background:rgba(255,255,255,0.03);margin-bottom:1.5rem;
  }
  .matcher-result-score{font-family:'Shippori Mincho',serif;font-size:2rem;color:var(--paper);margin-bottom:0.35rem;}
  .matcher-result-label{font-size:0.78rem;color:var(--muted);}
  .matcher-result-label.perfect{color:#1D9E75;}

  /* difficulty */
  .difficulty-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .difficulty-label{font-size:0.68rem;letter-spacing:0.1em;color:var(--muted);text-transform:uppercase;}
  .diff-btn{font-size:0.72rem;padding:0.3rem 0.7rem;border:1px solid rgba(255,255,255,0.12);background:none;color:rgba(245,240,232,0.5);border-radius:1px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all 0.15s;}
  .diff-btn:hover{color:var(--paper);border-color:rgba(255,255,255,0.3);}
  .diff-btn.active-easy{background:rgba(29,158,117,0.2);border-color:#1D9E75;color:#1D9E75;}
  .diff-btn.active-good{background:rgba(196,119,58,0.2);border-color:var(--accent2);color:var(--accent2);}
  .diff-btn.active-hard{background:rgba(139,26,26,0.2);border-color:var(--accent);color:#ff9999;}

  /* vocab */
  .vocab-panel{margin-top:2rem;border-top:1px solid rgba(255,255,255,0.08);padding-top:1.5rem;}
  .vocab-panel-title{font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem;}
  .vocab-list{display:flex;flex-wrap:wrap;gap:8px;}
  .vocab-pill{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:1px;padding:0.3rem 0.7rem;font-size:0.8rem;color:var(--paper);cursor:pointer;transition:border-color 0.15s;}
  .vocab-pill:hover{border-color:var(--accent2);}
  .vocab-pill span{color:var(--muted);font-size:0.72rem;margin-left:4px;}

  /* tooltip */
  .tooltip{position:fixed;background:var(--paper);color:var(--ink);border-radius:2px;padding:0.75rem 1rem;font-size:0.82rem;max-width:240px;pointer-events:none;z-index:1000;box-shadow:0 8px 32px rgba(0,0,0,0.4),0 0 0 1px rgba(26,20,16,0.12);opacity:0;transform:translateY(4px);transition:opacity 0.15s,transform 0.15s;}
  .tooltip.visible{opacity:1;transform:translateY(0);}
  .tooltip-reading{font-family:'Shippori Mincho',serif;font-size:1.1rem;color:var(--accent);margin-bottom:0.25rem;}
  .tooltip-meaning{color:var(--ink);line-height:1.5;}
  .tooltip-level{font-size:0.65rem;letter-spacing:0.1em;color:var(--muted);margin-top:0.35rem;}

  /* footer */
  .story-footer{font-size:0.7rem;letter-spacing:0.1em;color:var(--muted);margin-top:2rem;text-align:center;line-height:2;}
  .keyboard-hint{font-size:0.62rem;color:rgba(122,112,96,0.45);letter-spacing:0.08em;text-align:center;margin-top:1rem;}
  kbd{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:2px;padding:0.1rem 0.35rem;font-size:0.65rem;font-family:monospace;}

  /* loading */
  #loading-overlay{display:none;position:fixed;inset:0;background:var(--ink);z-index:500;align-items:center;justify-content:center;flex-direction:column;gap:1.5rem;}
  #loading-overlay.active{display:flex;}
  .loading-char{font-family:'Shippori Mincho',serif;font-size:5rem;color:var(--paper);opacity:0.15;animation:float 3s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0);opacity:0.1}50%{transform:translateY(-12px);opacity:0.25}}
  .loading-text{font-size:0.75rem;letter-spacing:0.2em;color:var(--muted);text-transform:uppercase;}

  .error-msg{background:rgba(139,26,26,0.15);border:1px solid rgba(139,26,26,0.3);border-radius:2px;padding:1rem;color:#ff9999;font-size:0.82rem;line-height:1.6;margin-top:1rem;}
  .stagger>*{opacity:0;animation:fadeIn 0.5s ease forwards;}
  .stagger>*:nth-child(1){animation-delay:0.05s}
  .stagger>*:nth-child(2){animation-delay:0.15s}
  .stagger>*:nth-child(3){animation-delay:0.25s}
  .stagger>*:nth-child(4){animation-delay:0.35s}
  .stagger>*:nth-child(5){animation-delay:0.45s}
  .stagger>*:nth-child(6){animation-delay:0.55s}
  .stagger>*:nth-child(7){animation-delay:0.65s}
  .stagger>*:nth-child(8){animation-delay:0.75s}
  @keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="tooltip" id="tooltip">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.25rem;">
    <div class="tooltip-reading" id="tt-reading" style="margin-bottom:0;"></div>
    <button class="tt-speak-btn" onclick="speakWord()" title="Hear pronunciation">
      <svg viewBox="0 0 10 10"><polygon points="1,2 4,2 7,0 7,10 4,8 1,8"/><path d="M8,3 Q10,5 8,7" stroke="currentColor" stroke-width="1" fill="none"/></svg>
    </button>
  </div>
  <div class="tooltip-meaning" id="tt-meaning"></div>
  <div class="tooltip-level" id="tt-level"></div>
</div>

<div id="loading-overlay">
  <div class="loading-char" id="loading-char">語</div>
  <div class="loading-text" id="loading-text">Crafting your story...</div>
</div>

<div id="setup-screen">
  <div class="setup-card">
    <div class="logo">読む</div>
    <div class="logo-sub">Immersive Japanese reading</div>
    <div class="setup-label">Your Level</div>
    <div class="level-grid">
      <button class="level-btn active" data-level="N5">N5</button>
      <button class="level-btn" data-level="N4">N4</button>
      <button class="level-btn" data-level="N3">N3</button>
      <button class="level-btn" data-level="N2">N2</button>
      <button class="level-btn" data-level="N1">N1</button>
    </div>
    <button class="start-btn" id="start-btn" onclick="startApp()">Let's read →</button>
    <div id="setup-error"></div>
    <p class="setup-note">Free Groq API key at <a href="https://console.groq.com" target="_blank">console.groq.com</a> — no credit card, no region blocks.</p>
  </div>
</div>

<div id="reader-screen">
  <div class="reader-header">
    <div class="header-left">
      <div class="header-logo">読む</div>
      <div class="level-badge" id="level-badge">N5</div>
      <div class="streak-badge" id="streak-badge"></div>
    </div>
    <div class="header-right">
      <div class="goal-ring" title="Stories read today">
        <svg class="ring-svg" viewBox="0 0 28 28">
          <circle class="ring-bg" cx="14" cy="14" r="11"/>
          <circle class="ring-fill" id="ring-fill" cx="14" cy="14" r="11" stroke-dasharray="69.1" stroke-dashoffset="69.1"/>
        </svg>
        <span class="ring-label" id="ring-label">0 today</span>
      </div>
      <button class="icon-btn" onclick="newStory()">+ New story</button>
      <button class="icon-btn" id="furigana-btn" onclick="toggleFurigana()">振り仮名 off</button>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div class="reader-body" id="reader-body">
    <!-- Part 1 scaffold — shown once, persists across parts -->
    <div id="story-scaffold" style="display:none;">

      <div class="story-genre" id="scaffold-genre"></div>
      <h1 class="story-title" id="scaffold-title"></h1>
      <div class="story-title-en" id="scaffold-title-en"></div>
      <div class="divider"></div>
      <!-- Part indicator — updated in place -->
      <div class="part-indicator" id="part-indicator"></div>
    </div>
    <!-- Swappable zone — text, buttons, vocab change per part -->
    <div id="part-loading" class="part-loading">
      <div class="part-spinner"></div>
      <span>Loading next part...</span>
    </div>
    <div id="story-content"></div>
  </div>
</div>

<script>
// ── CONSTANTS ────────────────────────────────────────────────────────────────
const CIRCUMFERENCE = 69.1;
const LEVEL_KEYS = ['N5','N4','N3','N2','N1'];
const LOADING_CHARS = ['語','読','書','聞','話','学','知','思'];
const LOADING_MSGS = ['Crafting your story...','Setting the scene...','Finding the words...','Almost ready...'];

// Curated topic list -- automatically rotated, never shown to user
const TOPICS = [
  'a morning at a quiet train station',
  'buying onigiri at a convenience store',
  'a cat sitting in a sunny window',
  'walking home in light rain',
  'making tea on a cold morning',
  'a child feeding ducks at a park',
  'watching fireworks from a rooftop',
  'a first day at a new school',
  'a grandmother teaching cooking',
  'finding a lost umbrella',
  'a dog waiting outside a shop',
  'the last train of the night',
  'eating ramen alone at a counter',
  'cherry blossoms falling in a park',
  'a letter arriving in the mail',
  'a small bookshop in a back street',
  'snow falling on a quiet town',
  'a festival stall at night',

function saveState() {
  localStorage.setItem('yomu-v3', JSON.stringify({
    level: state.level,
    currentModel: state.currentModel,
    storiesRead: state.storiesRead,
    todayCount: state.todayCount,

function loadSavedState() {
  try {
    const saved = localStorage.getItem('yomu-v3');
    if (saved) {
      const p = JSON.parse(saved);
      Object.assign(state, p);
    // Ensure model is valid
    if (!MODEL_CHAIN.includes(state.currentModel)) state.currentModel = MODEL_CHAIN[0];
      const today = todayStr();
      if (state.todayDate !== today) { state.todayCount = 0; state.todayDate = today; }
    }
    // key loaded into state.apiKey at startApp time
    document.querySelectorAll('.level-btn').forEach(b => b.classList.toggle('active', b.dataset.level === state.level));
  } catch(e) {}
}

function todayStr() { return new Date().toISOString().slice(0,10); }

function recordRead() {
  const today = todayStr();
  if (state.todayDate !== today) { state.todayCount = 0; state.todayDate = today; }
  state.todayCount++;
  state.storiesRead++;
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0,10);
  if (state.lastReadDate === yesterday) state.streak++;
  else if (state.lastReadDate !== today) state.streak = 1;
  state.lastReadDate = today;
  saveState();
  updateHeader();
}

// ── GENERATION ───────────────────────────────────────────────────────────────
async function generatePart(partNum, topic, arc) {
  const levelIdx = LEVEL_KEYS.indexOf(state.level);
  const seenList = Object.keys(state.seenWords).slice(0, 30).join('、');

  // Pick 3 random N5 grammar patterns to anchor this story
  const grammarSample = N5_GRAMMAR.sort(() => Math.random() - 0.5).slice(0, 3).join(', ');

  let systemPrompt, userPrompt;

  if (partNum === 1) {
    // Part 1: establish scene and characters
    systemPrompt = `You are a Japanese language teacher writing graded reading stories for JLPT ${state.level} learners.
Your stories must feel natural and immersive -- like real Japanese slice-of-life writing, not textbook exercises.
You write with warmth, sensory detail, and gentle emotion.`;

    userPrompt = `Write Part 1 of a 3-part Japanese story about: "${topic}"

STRICT vocabulary rules:
- Use ONLY ${state.level} vocabulary (the ~${[800,1500,3750,6000,10000][levelIdx]} most common Japanese words)
- Maximum 1 word from the level above (${LEVEL_KEYS[Math.min(levelIdx+1,4)]}) -- introduced naturally in context
- Zero words from N3 or higher
- Grammar patterns to use: ${grammarSample}
- Short, clear sentences. Maximum 15 words per sentence.
- 5 to 7 sentences only.

Story goal for Part 1: Set the scene and introduce the main character. End with a gentle moment of curiosity or anticipation -- not a cliffhanger, just a sense that something is about to happen.
${seenList ? `Try to reuse some words the learner has seen: ${seenList}` : ''}

Return ONLY valid JSON, no markdown:
{
  "title": "Japanese title (4-8 characters)",
  "title_en": "English title",
  "genre": "genre tag in Japanese (日常・旅行・謎 etc)",
  "summary": "1-sentence English summary of what happened, for story continuation",
  "sentences": [
    { "tokens": [
      { "surface": "東京", "reading": "とうきょう", "meaning": "Tokyo", "level": "N5", "has_kanji": true }
    ]}
  ]
}

Token rules (critical -- follow exactly):
- surface = the WRITTEN Japanese form exactly as it appears in the story (kanji/kana as written)
- reading = hiragana pronunciation of that surface form
- NEVER swap surface and reading. Surface is what you read. Reading is the pronunciation.
- meaning = clear English definition
- has_kanji = true if surface contains any kanji [一-龯]
- Each word, particle, and punctuation mark = its own token
- Particles (は、が、を、に、で、と、も、の、へ、から、まで、より): meaning = grammatical role (e.g. "topic marker", "object marker")
- Punctuation (。、！？…「」): reading = "", meaning = ""`;

  } else {
    // Parts 2 and 3: continue the arc
    const partGoals = {
      2: 'Develop the story. The character does something or discovers something. End with a small complication or warm moment.',
      3: 'Resolve the story gently. Give the character (and reader) a sense of peace or small joy. This is the final part -- conclude warmly.',
    };

    systemPrompt = `You are a Japanese language teacher continuing a graded reading story for JLPT ${state.level} learners.
Same strict vocabulary level as Part 1. Same characters. Same warm, immersive tone.`;

    userPrompt = `Continue the story. This is Part ${partNum} of 3.

Story so far: "${arc.summary}"
Title: ${arc.title} (${arc.title_en})

STRICT vocabulary rules (same as Part 1):
- ONLY ${state.level} vocabulary
- Maximum 1 word from ${LEVEL_KEYS[Math.min(levelIdx+1,4)]}
- Zero N3 or higher words
- Short sentences, maximum 15 words each
- 5 to 7 sentences only
- Grammar: ${grammarSample}

Part ${partNum} goal: ${partGoals[partNum]}
${seenList ? `Try to reuse: ${seenList}` : ''}

Return ONLY valid JSON, no markdown:
{
  "summary": "Updated 1-sentence summary of the full story so far (for Part ${partNum < 3 ? '3' : 'final'})",
  "sentences": [
    { "tokens": [
      { "surface": "東京", "reading": "とうきょう", "meaning": "Tokyo", "level": "N5", "has_kanji": true }
    ]}
  ]
}

Same token rules: surface=written form, reading=pronunciation, never swap them, has_kanji=true if contains kanji.`;
  }

  const currentModel = state.currentModel;

  // Part 1 = full loading screen; parts 2/3 = subtle inline spinner
  if (partNum === 1) {
    showLoading(true);
  } else {
    document.getElementById('part-loading')?.classList.add('active');
    document.getElementById('story-content').style.opacity = '0.3';
    // Disable continue button to prevent double-tap
    document.querySelectorAll('.continue-btn').forEach(b => b.disabled = true);
  }

  const currentModel = state.currentModel || MODEL_CHAIN[0];

  try {
    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${state.apiKey}` },
      body: JSON.stringify({
        model: currentModel,
        temperature: 0.85,
        max_tokens: 3000,
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: userPrompt }
        ]
      })
    });

    clearInterval(loadingMsgInterval);

    if (!response.ok) {
      const err = await response.json();
      const errMsg = err.error?.message || '';
      if (response.status === 429 || errMsg.toLowerCase().includes('rate limit')) {
        const nextModel = getNextModel(currentModel);
        if (nextModel) {
          state.currentModel = nextModel;
          saveState();
          clearInterval(loadingMsgInterval);
          showLoading(false);
          document.getElementById('part-loading')?.classList.remove('active');
          if (document.getElementById('story-content')) document.getElementById('story-content').style.opacity = '1';
          return generatePart(partNum, topic, arc);
        }
        throw new Error('Daily limit reached on all models. Try again tomorrow or upgrade at console.groq.com/settings/billing');
      }
      throw new Error(errMsg || 'API error ' + response.status);
    }

    const data = await response.json();
    let raw = data.choices?.[0]?.message?.content || '';
    raw = raw.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
    // Sometimes model wraps in extra object -- find first {
    const jsonStart = raw.indexOf('{');
    if (jsonStart > 0) raw = raw.slice(jsonStart);
    const result = JSON.parse(raw);

    if (partNum === 1) {
      state.arc = {
        title: result.title,
        title_en: result.title_en,
        genre: result.genre,
        summary: result.summary,
      };
    } else {
      state.arc.summary = result.summary || state.arc.summary;
    }

    state.currentPart = partNum;
    state.currentPartText = result.sentences.map(s => s.tokens.map(t => t.surface||'').join('')).join('');
    // Accumulate kanji words for end-of-arc matcher
    const skipM = ['particle','topic marker','subject marker','object marker','direction','location marker','possessive','conjunction','copula','sentence-final'];
    for (const sentence of result.sentences) {
      for (const token of sentence.tokens) {
        if (!token.has_kanji) continue;
        if (!token.meaning || token.meaning.length < 2) continue;
        if (skipM.some(p => (token.meaning||'').toLowerCase().includes(p))) continue;
        // Dedupe by surface
        if (!state.arcKanjiWords.find(w => w.surface === token.surface)) {
          state.arcKanjiWords.push({ surface: token.surface, reading: token.reading||'', meaning: token.meaning||'' });
        }
      }
    }
    if (partNum === 1) recordRead();
    renderPart(result, partNum);


  } catch(e) {
    clearInterval(loadingMsgInterval);
    showLoading(false);
    document.getElementById('part-loading')?.classList.remove('active');
    if (document.getElementById('story-content')) document.getElementById('story-content').style.opacity = '1';
    const isFileProtocol = location.protocol === 'file:';
    const isNetworkError = e.message === 'Load failed' || e.message === 'Failed to fetch' || e.message === 'NetworkError when attempting to fetch resource.';
    let msg = e.message;
    if (isFileProtocol && isNetworkError) {
      msg = 'On mobile, the app must be hosted online -- it cannot run from a local file. See instructions below.';
    } else if (isNetworkError) {
      msg = 'Network error -- check your internet connection and try again.';
    }
    document.getElementById('reader-body').innerHTML =
      `<div class="error-msg"><strong>Error:</strong> ${msg}</div>`;
  }
}

// ── RENDERING ────────────────────────────────────────────────────────────────
function buildSentencesHTML(sentences) {
  const vocabEntries = [];
  const skipMeanings = ['particle','topic marker','subject marker','object marker',
    'direction','location marker','possessive','conjunction','copula','sentence-final'];

  let html = '';
  sentences.forEach((sentence, si) => {
    let tokensHTML = '';
    for (const token of sentence.tokens) {
      if (!token.surface) continue;
      // Pure punctuation / whitespace -- render plain (fixes missing 。、etc.)
      const isPunct = !token.meaning && !token.has_kanji;
      if (isPunct) {
        tokensHTML += `<span>${token.surface}</span>`;
        continue;
      }
      const isKanji = !!token.has_kanji;
      let cls = 'word-token' + (isKanji ? ' has-kanji' : '');
      // Color coding
      const m = (token.meaning||'').toLowerCase();
      const s = token.surface||'';
      if (m.includes('name') || m.includes("'s name") || token.level === 'name' ||
          (s.length >= 2 && token.reading && /^[ぁ-ん]+$/.test(token.reading) && m.match(/^[A-Z]/))) {
        cls += ' token-name';
      } else if (s === 'は' && m.includes('topic')) {
        cls += ' token-topic';
      } else if (s === 'も' && (m.includes('also') || m.includes('too') || m.includes('topic'))) {
        cls += ' token-topic';
      } else if (!isKanji && ['は','が','を','に','で','と','も','の','へ','から','まで','より','ね','よ','か'].includes(s)) {
        cls += ' token-particle';
      }
      const enc = encodeURIComponent(JSON.stringify({
        s: token.surface, r: token.reading||'', m: token.meaning||'', l: token.level||''
      }));
      tokensHTML += `<span class="${cls}" data-token="${enc}" onclick="handleWordClick(this)" onmouseenter="showTooltip(this,event)" onmouseleave="hideTooltip()">${token.surface}</span>`;
      if (token.meaning && token.meaning.length > 2 &&
          !skipMeanings.some(p => (token.meaning||'').toLowerCase().includes(p))) {
        vocabEntries.push(token);
      }
    }

    html += `<span class="sentence-wrap">${tokensHTML}</span>`;
  });

  return { html, vocabEntries };
}

function renderPart(result, partNum) {
  showLoading(false);
  document.getElementById('part-loading')?.classList.remove('active');
  if (document.getElementById('story-content')) document.getElementById('story-content').style.opacity = '1';

  const vocabHTML = Object.values(vocabMap).slice(0, 18).map(t => {
    const s = t.surface.replace(/'/g,"&#39;");

  // Update part dots in-place

  }

  // Swap only the content zone -- image/title stay put
  const fullText = result.sentences.map(s => s.tokens.map(t => t.surface||'').join('')).join('');
  const encText = fullText.replace(/`/g,'').replace(/\$/g,'');

    <div class="story-footer">${state.storiesRead} ${state.storiesRead === 1 ? 'story' : 'stories'} read · ${Object.keys(state.seenWords).length} words encountered</div>`;

// ── KANJI MATCHER ─────────────────────────────────────────────────────────────
let matcherState = {
  pairs: [],          // [{surface, reading, meaning, id}]
  selectedKanji: null,
  errors: 0,
  remaining: 0,
};

function buildMatcher() {
  const zone = document.getElementById('matcher-zone');
  if (!zone) return;

  // Pick up to 12 kanji words from arc
  const pool = state.arcKanjiWords.slice(0, 12);
  if (pool.length < 2) {
    // Not enough kanji — just show difficulty
    showDifficulty();
    return;
  }

  matcherState.pairs = pool.map((w, i) => ({ ...w, id: i, matched: false }));
  matcherState.selectedKanji = null;
  matcherState.errors = 0;
  matcherState.remaining = pool.length;

  // Shuffle meanings separately
  const shuffledMeanings = [...matcherState.pairs].sort(() => Math.random() - 0.5);

  const kanjiCol = matcherState.pairs.map(p => `
    <div class="match-card" id="kcard-${p.id}" onclick="selectKanji(${p.id})">
      <button class="furi-btn" id="fbtn-${p.id}" onclick="event.stopPropagation();toggleCardFuri(${p.id})" title="Show reading">あ</button>
      <div style="flex:1;">
        <div class="match-furigana" id="furi-${p.id}">${p.reading}</div>
        <div class="match-kanji-text">${p.surface}</div>
      </div>
    </div>`).join('');

  const meaningCol = shuffledMeanings.map(p => `
    <div class="match-card" id="mcard-${p.id}" onclick="selectMeaning(${p.id})">
      <div class="match-meaning-text">${p.meaning}</div>
    </div>`).join('');

  zone.innerHTML = `
    <div class="matcher-section">
      <div class="matcher-title">漢字マッチング</div>
      <div class="matcher-subtitle">Match each kanji to its meaning. Tap あ to reveal the reading.</div>
      <div class="matcher-score">Errors: <strong id="error-count">0</strong></div>
      <div class="matcher-columns">
        <div class="matcher-col" id="kanji-col">${kanjiCol}</div>
        <div class="matcher-col" id="meaning-col">${meaningCol}</div>
      </div>
    </div>`;
}

function toggleCardFuri(id) {
  const furi = document.getElementById('furi-' + id);
  const btn = document.getElementById('fbtn-' + id);
  if (!furi || !btn) return;
  const visible = furi.classList.toggle('visible');
  btn.classList.toggle('active', visible);
}

function selectKanji(id) {
  const pair = matcherState.pairs.find(p => p.id === id);
  if (!pair || pair.matched) return;

  // Deselect previous kanji
  if (matcherState.selectedKanji !== null) {
    document.getElementById('kcard-' + matcherState.selectedKanji)?.classList.remove('selected');
  }

  if (matcherState.selectedKanji === id) {
    // Tapping same card again deselects
    matcherState.selectedKanji = null;
    return;
  }

  matcherState.selectedKanji = id;
  document.getElementById('kcard-' + id)?.classList.add('selected');
}

function selectMeaning(meaningId) {
  if (matcherState.selectedKanji === null) return;
  const kanjiId = matcherState.selectedKanji;
  const kCard = document.getElementById('kcard-' + kanjiId);
  const mCard = document.getElementById('mcard-' + meaningId);
  if (!kCard || !mCard) return;

  kCard.classList.remove('selected');
  matcherState.selectedKanji = null;

  if (kanjiId === meaningId) {
    // CORRECT
    kCard.classList.add('correct');
    mCard.classList.add('correct');
    matcherState.pairs.find(p => p.id === kanjiId).matched = true;
    matcherState.remaining--;
    setTimeout(() => {
      kCard.classList.add('gone');
      mCard.classList.add('gone');
      if (matcherState.remaining === 0) showMatcherResult();
    }, 500);
  } else {
    // WRONG
    matcherState.errors++;
    document.getElementById('error-count').textContent = matcherState.errors;
    kCard.classList.add('wrong');
    mCard.classList.add('wrong');
    setTimeout(() => {
      kCard.classList.remove('wrong');
      mCard.classList.remove('wrong');
    }, 400);
  }
}

function showMatcherResult() {
  const zone = document.getElementById('matcher-zone');
  if (!zone) return;
  const errors = matcherState.errors;
  const perfect = errors === 0;
  const label = perfect ? 'Perfect! No errors.' :
    errors === 1 ? '1 error -- almost perfect!' :
    errors <= 3 ? `${errors} errors -- good effort!` :
    `${errors} errors -- keep reading!`;

  zone.innerHTML += `
    <div class="matcher-result">
      <div class="matcher-result-score">${perfect ? '完璧' : errors + ' ×'}</div>
      <div class="matcher-result-label ${perfect ? 'perfect' : ''}">${label}</div>
    </div>`;

  showDifficulty();
}

function showDifficulty() {
  const dz = document.getElementById('difficulty-zone');
  if (dz) {
    dz.style.display = 'block';
    dz.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

// ── DIFFICULTY ────────────────────────────────────────────────────────────────
function applyDifficulty(rating) {
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active-easy','active-good','active-hard'));
  if (rating === 'easy') {
    document.getElementById('diff-easy')?.classList.add('active-easy');
    state.easyCount++; state.hardCount = 0;
    if (state.easyCount >= 3) nudgeLevel(1);
  } else if (rating === 'hard') {
    document.getElementById('diff-hard')?.classList.add('active-hard');
    state.hardCount++; state.easyCount = 0;
    if (state.hardCount >= 2) nudgeLevel(-1);
  } else {
    document.getElementById('diff-good')?.classList.add('active-good');
    state.easyCount = 0; state.hardCount = 0;
  }
  saveState();
}

function nudgeLevel(dir) {
  const idx = LEVEL_KEYS.indexOf(state.level);
  const newIdx = Math.max(0, Math.min(4, idx + dir));
  if (newIdx === idx) return;
  state.level = LEVEL_KEYS[newIdx];
  state.easyCount = 0; state.hardCount = 0;
  document.querySelectorAll('.level-btn').forEach(b => b.classList.toggle('active', b.dataset.level === state.level));
  updateHeader();
  const badge = document.getElementById('level-badge');
  badge.style.color = dir > 0 ? '#1D9E75' : '#ff9999';
  setTimeout(() => { badge.style.color = ''; }, 2000);
}

// ── FURIGANA ─────────────────────────────────────────────────────────────────
function toggleFurigana() {
  state.furiganaAll = !state.furiganaAll;
  const fb = document.getElementById('furigana-btn');
  if (fb) fb.textContent = state.furiganaAll ? '振り仮名 on' : '振り仮名 off';
  document.querySelectorAll('#story-text .word-token').forEach(el => {
    const data = JSON.parse(decodeURIComponent(el.dataset.token));
    const hasKanji = /[\u4e00-\u9fff\u3400-\u4dbf]/.test(data.s);
    if (!hasKanji || !data.r) return;
    if (state.furiganaAll) {
      if (!el.querySelector('ruby')) el.innerHTML = `<ruby>${data.s}<rt>${data.r}</rt></ruby>`;
    } else {
      if (!el.classList.contains('clicked')) el.innerHTML = data.s;
    }
  });
}

// ── WORD INTERACTION ─────────────────────────────────────────────────────────
function handleWordClick(el) {
  const data = JSON.parse(decodeURIComponent(el.dataset.token));
  state.seenWords[data.s] = (state.seenWords[data.s] || 0) + 1;
  saveState();
  el.classList.add('clicked');
  if (data.r && /[\u4e00-\u9fff\u3400-\u4dbf]/.test(data.s) && !el.querySelector('ruby')) {
    el.innerHTML = `<ruby>${data.s}<rt>${data.r}</rt></ruby>`;
  }
}

let tooltipTimeout;
let currentTooltipWord = null;
function showTooltip(el, event) {
  clearTimeout(tooltipTimeout);
  const data = JSON.parse(decodeURIComponent(el.dataset.token));
  if (!data.m || data.m.length < 2) return;
  const tt = document.getElementById('tooltip');
  document.getElementById('tt-reading').textContent = data.r || data.s;
  document.getElementById('tt-meaning').textContent = data.m;
  document.getElementById('tt-level').textContent = data.l ? `JLPT ${data.l}` : '';
  const x = Math.min(event.clientX + 12, window.innerWidth - 260);
  const y = Math.max(event.clientY - 90, 10);
  tt.style.left = x + 'px';
  tt.style.top = y + 'px';
  tt.style.transform = '';
  tt.classList.add('visible');
  currentTooltipWord = { reading: data.r, surface: data.s };
}

function hideTooltip() {
  tooltipTimeout = setTimeout(() => document.getElementById('tooltip').classList.remove('visible'), 150);
}

function dismissTooltip() {
  clearTimeout(tooltipTimeout);
  document.getElementById('tooltip').classList.remove('visible');
  currentTooltipWord = null;
}

function handleVocabPillClick(surface, reading, meaning, level) {
  state.seenWords[surface] = (state.seenWords[surface] || 0) + 1;
  saveState();
  const tt = document.getElementById('tooltip');
  document.getElementById('tt-reading').textContent = `${surface}　${reading}`;
  document.getElementById('tt-meaning').textContent = meaning;
  document.getElementById('tt-level').textContent = level ? `JLPT ${level}` : '';
  tt.style.left = '50%';
  tt.style.top = '50%';
  tt.style.transform = 'translate(-50%,-50%)';
  tt.classList.add('visible');
  setTimeout(() => { tt.classList.remove('visible'); tt.style.transform = ''; }, 2200);
}

// ── AUDIO ────────────────────────────────────────────────────────────────────
let paraPlaying = false;

function getJpVoice() {
  const voices = window.speechSynthesis.getVoices();
  return voices.find(v => v.lang === 'ja-JP' && v.localService)
    || voices.find(v => v.lang === 'ja-JP')
    || voices.find(v => v.lang.startsWith('ja'));
}

function setParaPlayState(playing) {
  paraPlaying = playing;
  const btn = document.getElementById('para-play-btn');
  const icon = document.getElementById('para-play-icon');
  const label = document.getElementById('para-play-label');
  if (!btn) return;
  if (playing) {
    btn.classList.add('playing');
    if (icon) icon.setAttribute('points','2,1 4,1 4,9 2,9 6,1 8,1 8,9 6,9');
    if (label) label.textContent = 'Stop';
  } else {
    btn.classList.remove('playing');
    if (icon) icon.setAttribute('points','1,1 9,5 1,9');
    if (label) label.textContent = 'Listen to this part';
  }
}

function toggleParaAudio() {
  if (!window.speechSynthesis) return;
  if (paraPlaying || window.speechSynthesis.speaking) {
    window.speechSynthesis.cancel();
    setParaPlayState(false);
    return;
  }
  const text = state.currentPartText;
  if (!text) return;
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ja-JP';
  utter.rate = 0.84;
  utter.pitch = 1.0;
  const voice = getJpVoice();
  if (voice) utter.voice = voice;
  utter.onstart = () => setParaPlayState(true);
  utter.onend = () => setParaPlayState(false);
  utter.onerror = () => setParaPlayState(false);
  window.speechSynthesis.speak(utter);
}

function speakWord() {
  if (!currentTooltipWord || !window.speechSynthesis) return;
  const text = currentTooltipWord.reading || currentTooltipWord.surface;
  if (!text) return;
  if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ja-JP';
  utter.rate = 0.75;
  const voice = getJpVoice();
  if (voice) utter.voice = voice;
  window.speechSynthesis.speak(utter);
}

// ── TAP OUTSIDE TO DISMISS TOOLTIP ──────────────────────────────────────────
document.addEventListener('click', e => {
  const tt = document.getElementById('tooltip');
  if (!tt.classList.contains('visible')) return;
  // If click is not on a word-token or the tooltip itself, dismiss
  if (!e.target.closest('.word-token') && !e.target.closest('.tooltip') && !e.target.closest('.vocab-pill')) {
    dismissTooltip();
  }
});

// ── KEYBOARD ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') {
    e.preventDefault();
    if (state.currentPart > 0 && state.currentPart < 3) continuePart();
    else newStory();
  }
  if (e.code === 'KeyF') toggleFurigana();
});

// ── LOADING ──────────────────────────────────────────────────────────────────
function showLoading(show) {
  document.getElementById('loading-overlay').classList.toggle('active', show);
  if (show) {
    let i = 0, j = 0;
    loadingInterval = setInterval(() => {
      const el = document.getElementById('loading-char');
      if (el) el.textContent = LOADING_CHARS[i++ % LOADING_CHARS.length];
    }, 400);
    loadingMsgInterval = setInterval(() => {
      const el = document.getElementById('loading-text');
      if (el) el.textContent = LOADING_MSGS[j++ % LOADING_MSGS.length];
    }, 1800);
  } else {
    clearInterval(loadingInterval);
    clearInterval(loadingMsgInterval);
  }
}

// ── INIT ─────────────────────────────────────────────────────────────────────
loadSavedState();
</script>
